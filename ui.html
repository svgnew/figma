<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --brand: #2E95FF;
      --brand-dark: #1A7EDD;
      --brand-glow: rgba(46, 149, 255, 0.25);
      --green: #00FFBF;
      --success: #22C55E;
      --success-bg: rgba(34, 197, 94, 0.08);
      --error: #EF4444;
      --error-bg: rgba(239, 68, 68, 0.08);
      --fg: var(--figma-color-text, #1a1a1a);
      --fg2: var(--figma-color-text-secondary, #8b8b8b);
      --fg3: var(--figma-color-text-tertiary, #b3b3b3);
      --bg: var(--figma-color-bg, #ffffff);
      --bg2: var(--figma-color-bg-secondary, #f5f5f5);
      --border: var(--figma-color-border, #e5e5e5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: #f5f5f5;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      position: relative;
      overflow: hidden;
    }
    .header::after { display: none; }
    .logo-full { height: 22px; width: auto; flex-shrink: 0; }
    .header-sub { font-size: 10px; color: var(--fg2); margin-top: 6px; font-weight: 500; }

    /* Content */
    .content { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* Convert button */
    .btn-convert {
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
      color: #fff;
      box-shadow: 0 2px 10px rgba(99,102,241,0.35);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: -0.1px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    }
    .btn-convert:hover:not(:disabled) {
      box-shadow: 0 4px 18px rgba(99,102,241,0.45);
      transform: translateY(-1px);
    }
    .btn-convert:active:not(:disabled) {
      transform: translateY(0.5px);
      box-shadow: 0 1px 4px rgba(99,102,241,0.25);
    }
    .btn-convert:disabled {
      background: linear-gradient(135deg, #93a3c8 0%, #a8a0d0 100%);
      box-shadow: none;
      cursor: not-allowed;
      text-shadow: none;
    }
    .btn-convert svg { width: 18px; height: 18px; }

    /* Divider */
    .divider { display: flex; align-items: center; gap: 12px; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 10px; font-weight: 600; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(46,149,255,0.02);
    }
    .drop-zone:hover { border-color: var(--brand); background: rgba(46,149,255,0.04); }
    .drop-zone.dragover { border-color: var(--brand); background: rgba(46,149,255,0.08); border-style: solid; }
    .drop-icon {
      width: 32px; height: 32px; margin: 0 auto 8px;
      background: rgba(46,149,255,0.08); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .drop-icon svg { width: 16px; height: 16px; color: var(--brand); }
    .drop-label { font-size: 12px; font-weight: 600; color: var(--fg); }
    .drop-hint { font-size: 11px; color: var(--fg2); margin-top: 2px; }

    /* Progress */
    .progress { display: none; flex-direction: column; gap: 6px; }
    .progress.visible { display: flex; }
    .progress-track { width: 100%; height: 4px; background: var(--bg2); border-radius: 4px; overflow: hidden; }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--green), var(--brand));
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-bar.indeterminate {
      width: 30%;
      background: linear-gradient(90deg, var(--green), var(--brand), var(--green));
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite, grow 2s ease-in-out infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes grow { 0%,100% { width: 25%; } 50% { width: 75%; } }
    .progress-info { display: flex; justify-content: space-between; align-items: center; }
    .progress-text { font-size: 11px; color: var(--fg2); font-weight: 500; }
    .progress-pct { font-size: 11px; color: var(--brand); font-weight: 600; font-variant-numeric: tabular-nums; }

    /* Status */
    .status {
      display: none; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(4px); } }
    .status.visible { display: flex; }
    .status.success { background: var(--success-bg); color: #16a34a; }
    .status.error { background: var(--error-bg); color: #dc2626; }
    .status svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Settings */
    .settings { border-top: 1px solid var(--border); padding-top: 12px; }
    .settings-toggle {
      display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;
    }
    .settings-toggle:hover .gear { color: var(--brand); }
    .gear { width: 14px; height: 14px; color: var(--fg2); transition: color 0.15s; }
    .settings-label { font-size: 11px; font-weight: 600; color: var(--fg2); flex: 1; }
    .chevron { width: 12px; height: 12px; color: var(--fg3); transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }
    .settings-body { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .settings-body.open { max-height: 80px; }
    .key-input {
      width: 100%; margin-top: 8px; padding: 8px 10px;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 12px; font-family: inherit; background: var(--bg2); color: var(--fg); outline: none;
    }
    .key-input:focus { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-glow); }
    .key-status { font-size: 10px; margin-top: 4px; font-weight: 500; min-height: 14px; }
    .key-status.saved { color: var(--success); }
    .key-status.empty { color: var(--fg3); }

    /* Footer */
    .footer {
      padding: 10px 20px; text-align: center; font-size: 10px; color: var(--fg3);
      border-top: 1px solid var(--border);
    }
    .footer a { color: var(--brand); text-decoration: none; font-weight: 600; }

    .spinner { width: 16px; height: 16px; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <svg class="logo-full" viewBox="0 0 901 297" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M303.666 6.41263C302.41 3.76059 304.342 0.703226 307.277 0.700455C395.565 0.617076 483.864 0.65276 572.151 0.703054C575.064 0.704713 576.997 3.71816 575.773 6.36098C561.658 36.8495 546.488 66.8476 532.536 97.4133C507.536 148.973 483.629 201.08 458.896 252.787C453.959 263.953 448.398 274.853 443.371 285.976C441.939 289.144 437.386 289.222 435.917 286.07C392.333 192.636 347.831 99.5976 303.666 6.41263Z" fill="url(#pl0)"/>
      <path d="M670.776 24.8533C695.176 8.96001 724.229-0.119965 753.443 0.626702C779.349 0.760035 805.083 8.21336 827.323 21.4534C834.557 25.7601 840.148 29.8589 848.944 38.0289C850.536 39.5074 850.623 41.9925 849.15 43.5894C838.753 54.86 828.979 64.5009 818.883 75.52C799.119 97.5975 779.188 119.508 759.599 141.739C757.368 144.271 759.092 148.237 762.466 148.308C784.315 148.763 806.189 148.246 828.043 148.4C850.798 148.337 873.553 148.607 896.32 148.446C898.52 148.43 900.33 150.19 900.298 152.39C899.67 196.072 877.712 238.562 843.069 265.027C835.349 271.373 826.709 276.347 817.976 281.133C775.509 302.64 722.469 301.8 680.883 278.493C664.856 270.053 650.496 258.507 639.003 244.493C605.163 206.573 594.189 150.147 611.016 102.24C621.269 70.5467 643.149 43.2133 670.776 24.8533Z" fill="url(#pl1)"/>
      <path d="M10.4159 37.6667C23.4292 15.2 48.8159 0.333337 74.8159 0.253337C118.803 0.160003 162.789 0.30667 206.776 0.253337C220.992 0.110732 235.218 0.437417 249.438 0.223612C252.933 0.171053 254.894 4.30317 252.606 6.9471C225.07 38.7782 197.96 71.0182 170.283 102.76C157.838 117.449 145.368 132.138 132.35 146.318C131.946 146.759 131.447 147.1 130.888 147.311L130.851 147.326C130.377 147.504 129.876 147.601 129.37 147.602C112.039 147.637 94.7209 147.546 77.4025 147.52C60.2692 147.653 42.8692 142.253 29.6692 131.147C16.2292 121.093 7.20254 106.013 2.82921 89.96C-1.11746 72.4267 1.28255 53.2667 10.4159 37.6667Z" fill="url(#pl2)"/>
      <path d="M130.652 149.364C131.066 148.879 131.588 148.494 132.19 148.282C134.31 147.536 136.543 147.162 138.816 147.267C154.829 147.373 170.856 147.16 186.869 147.453C204.643 148.027 221.683 155.587 234.989 167.187C250.563 181.307 260.136 202.213 259.243 223.373C259.736 254 238.269 283.093 209.336 292.573C200.723 295.133 191.736 296.213 182.789 296.547C125.745 296.395 68.6876 296.399 11.6415 296.434C8.15302 296.436 6.37472 292.322 8.79895 289.813C11.9471 286.556 15.0461 283.355 18.0294 279.947C48.6961 244.8 78.8961 209.24 109.656 174.173C116.609 165.874 123.611 157.601 130.652 149.364Z" fill="url(#pl3)"/>
      <defs>
        <linearGradient id="pl0" x1="586" y1="-6" x2="333" y2="311" gradientUnits="userSpaceOnUse"><stop stop-color="#FF0090"/><stop offset="1" stop-color="#7200DD"/></linearGradient>
        <linearGradient id="pl1" x1="908" y1="-6" x2="657" y2="328" gradientUnits="userSpaceOnUse"><stop stop-color="#FCAF28"/><stop offset="1" stop-color="#FF3C00"/></linearGradient>
        <linearGradient id="pl2" x1="265" y1="-3" x2="171" y2="216" gradientUnits="userSpaceOnUse"><stop stop-color="#00FFBF"/><stop offset="1" stop-color="#2E95FF"/></linearGradient>
        <linearGradient id="pl3" x1="266" y1="144" x2="169" y2="365" gradientUnits="userSpaceOnUse"><stop stop-color="#00FFBF"/><stop offset="1" stop-color="#2E95FF"/></linearGradient>
      </defs>
    </svg>
    <p class="header-sub">Image to SVG vectorizer</p>
  </div>

  <div class="content">
    <button class="btn-convert" id="btn" onclick="convert()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      Vectorize Selected Layer
    </button>

    <div class="progress" id="progress">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-info">
        <div class="progress-text" id="progressText">Vectorizing...</div>
        <div class="progress-pct" id="progressPct"></div>
      </div>
    </div>

    <div class="status" id="status">
      <span id="statusIcon"></span>
      <span id="statusText"></span>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or upload</span>
      <div class="divider-line"></div>
    </div>

    <div class="drop-zone" id="drop" onclick="document.getElementById('file').click()">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-label">Drop an image here</div>
      <div class="drop-hint">PNG, JPG, or WebP</div>
    </div>
    <input type="file" id="file" accept="image/png,image/jpeg,image/webp" style="display:none" />

    <div class="settings">
      <div class="settings-toggle" onclick="toggleSettings()">
        <svg class="gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="settings-label">API Key</span>
        <svg class="chevron" id="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="settings-body" id="settingsBody">
        <input class="key-input" type="password" id="apiKey" placeholder="svk_..." autocomplete="off" />
        <div class="key-status" id="keyStatus"></div>
      </div>
    </div>
  </div>

  <div class="footer">Get your key at <a href="https://svg.new/account" target="_blank">svg.new/account</a></div>

  <script>
    let busy = false;
    const $ = id => document.getElementById(id);

    // Settings
    function toggleSettings() {
      $('settingsBody').classList.toggle('open');
      $('chev').classList.toggle('open');
    }

    // Key persistence via Figma clientStorage (localStorage doesn't persist in plugins)
    const keyEl = $('apiKey');
    const keyStatus = $('keyStatus');
    let keySaveTimer = null;
    parent.postMessage({ pluginMessage: { type: 'get-key' } }, '*');
    keyEl.addEventListener('input', () => {
      clearTimeout(keySaveTimer);
      keySaveTimer = setTimeout(() => {
        parent.postMessage({ pluginMessage: { type: 'save-key', key: keyEl.value } }, '*');
        if (keyEl.value.trim()) {
          keyStatus.textContent = '✓ Key saved';
          keyStatus.className = 'key-status saved';
        } else {
          keyStatus.textContent = '';
          keyStatus.className = 'key-status';
        }
      }, 300);
    });

    function getKey() {
      const k = keyEl.value.trim();
      if (!k) {
        if (!$('settingsBody').classList.contains('open')) toggleSettings();
        showError('Enter your API key');
        keyEl.focus();
        return null;
      }
      return k;
    }

    // Status
    function showProgress(msg, percent) {
      $('progress').classList.add('visible');
      $('progressText').textContent = msg;
      $('status').className = 'status';
      const bar = $('progressBar');
      const pct = $('progressPct');
      if (typeof percent === 'number') {
        bar.classList.remove('indeterminate');
        bar.style.width = percent + '%';
        pct.textContent = percent + '%';
      } else {
        bar.classList.add('indeterminate');
        bar.style.width = '';
        pct.textContent = '';
      }
    }
    function hideProgress() {
      $('progress').classList.remove('visible');
      $('progressBar').classList.remove('indeterminate');
      $('progressBar').style.width = '0%';
      $('progressPct').textContent = '';
    }

    function showSuccess(msg) {
      hideProgress();
      $('status').className = 'status visible success';
      $('statusIcon').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
      $('statusText').textContent = msg;
    }
    function showError(msg) {
      hideProgress();
      $('status').className = 'status visible error';
      $('statusIcon').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
      $('statusText').textContent = msg;
    }

    function setBusy(on) {
      busy = on;
      const b = $('btn');
      b.disabled = on;
      b.innerHTML = on
        ? '<svg class="spinner" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/><path d="M22 12a10 10 0 0 0-10-10" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>Vectorizing...'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Vectorize Selected Layer';
    }

    // Convert
    function convert() {
      if (busy) return;
      if (!getKey()) return;
      setBusy(true);
      $('status').className = 'status';
      showProgress('Exporting layer...', null);
      parent.postMessage({ pluginMessage: { type: 'vectorize-selection' } }, '*');
    }

    function formatStage(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    async function vectorize(base64) {
      const key = getKey();
      if (!key) { setBusy(false); return; }
      showProgress('Vectorizing with AI...', null);
      try {
        const res = await fetch('https://svg.new/api/agent/vectorize', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + key,
          },
          body: JSON.stringify({ image: base64 }),
        });
        if (!res.ok) {
          const e = await res.json().catch(() => ({}));
          throw new Error(e.error || 'Error ' + res.status);
        }
        const data = await res.json();
        showProgress('Inserting SVG...', 100);
        parent.postMessage({ pluginMessage: { type: 'insert-svg', svg: data.svg } }, '*');
      } catch (e) {
        showError(e.message);
        setBusy(false);
      }
    }

    // Messages from sandbox
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'image-data') {
        const bytes = new Uint8Array(msg.data);
        let bin = '';
        for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
        vectorize('data:image/png;base64,' + btoa(bin));
      }
      if (msg.type === 'done') { showSuccess('Vector inserted!'); setBusy(false); }
      if (msg.type === 'error') { showError(msg.message); setBusy(false); }
      if (msg.type === 'status') showProgress(msg.message, null);
      if (msg.type === 'stored-key' && msg.key) {
        keyEl.value = msg.key;
        keyStatus.textContent = '✓ Key saved';
        keyStatus.className = 'key-status saved';
      }
    };

    // File upload
    const drop = $('drop');
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
    $('file').addEventListener('change', e => handleFile(e.target.files[0]));

    function handleFile(f) {
      if (!f || !f.type.startsWith('image/')) { showError('Not a valid image'); return; }
      if (!getKey()) return;
      setBusy(true);
      $('status').className = 'status';
      showProgress('Reading file...', null);
      const r = new FileReader();
      r.onload = () => vectorize(r.result);
      r.readAsDataURL(f);
    }
  </script>
</body>
</html>
