<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --brand: #2E95FF;
      --brand-dark: #1A7EDD;
      --brand-glow: rgba(46, 149, 255, 0.25);
      --brand-subtle: rgba(46, 149, 255, 0.06);
      --success: #22C55E;
      --success-bg: rgba(34, 197, 94, 0.08);
      --error: #EF4444;
      --error-bg: rgba(239, 68, 68, 0.08);
      --fg: var(--figma-color-text, #1a1a1a);
      --fg2: var(--figma-color-text-secondary, #8b8b8b);
      --fg3: var(--figma-color-text-tertiary, #b3b3b3);
      --bg: var(--figma-color-bg, #ffffff);
      --bg2: var(--figma-color-bg-secondary, #f5f5f5);
      --border: var(--figma-color-border, #e5e5e5);
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--fg);
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #2E95FF 0%, #1A6FCC 100%);
      padding: 20px 20px 18px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.18);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      flex-shrink: 0;
    }
    .logo-mark svg {
      width: 18px;
      height: 18px;
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      margin-top: 1px;
      font-weight: 500;
    }

    /* ── Content ── */
    .content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Primary button ── */
    .btn-convert {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      background: linear-gradient(135deg, #2E95FF 0%, #1A7EDD 100%);
      color: #fff;
      box-shadow: 0 2px 8px rgba(46,149,255,0.3), 0 1px 2px rgba(0,0,0,0.06);
      transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      letter-spacing: -0.1px;
    }
    .btn-convert::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-convert:hover:not(:disabled) {
      box-shadow: 0 4px 16px rgba(46,149,255,0.4), 0 2px 4px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }
    .btn-convert:hover:not(:disabled)::before {
      opacity: 1;
    }
    .btn-convert:active:not(:disabled) {
      transform: translateY(0.5px);
      box-shadow: 0 1px 4px rgba(46,149,255,0.25);
    }
    .btn-convert:disabled {
      background: linear-gradient(135deg, #a0c4e8 0%, #8fb5d9 100%);
      box-shadow: none;
      cursor: not-allowed;
    }
    .btn-convert .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-convert .icon-convert {
      width: 18px;
      height: 18px;
      opacity: 0.9;
    }

    /* ── Divider ── */
    .divider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-text {
      font-size: 11px;
      font-weight: 600;
      color: var(--fg3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      background: var(--brand-subtle);
    }
    .drop-zone:hover {
      border-color: var(--brand);
      background: rgba(46,149,255,0.06);
    }
    .drop-zone.dragover {
      border-color: var(--brand);
      background: rgba(46,149,255,0.1);
      border-style: solid;
      animation: dropPulse 1.5s ease-in-out infinite;
    }
    @keyframes dropPulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--brand-glow); }
      50% { box-shadow: 0 0 0 6px transparent; }
    }
    .drop-icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 10px;
      background: rgba(46,149,255,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .drop-icon svg { width: 18px; height: 18px; color: var(--brand); }
    .drop-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 3px;
    }
    .drop-hint {
      font-size: 11px;
      color: var(--fg2);
    }

    /* ── Progress bar ── */
    .progress-container {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }
    .progress-container.visible {
      display: flex;
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--bg2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, var(--brand), #60b3ff, var(--brand));
      background-size: 200% 100%;
      border-radius: 4px;
      animation: progressShimmer 1.8s ease-in-out infinite, progressGrow 2s ease-in-out infinite;
    }
    @keyframes progressShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes progressGrow {
      0%, 100% { width: 25%; }
      50% { width: 75%; }
    }
    .progress-label {
      font-size: 12px;
      color: var(--fg2);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .progress-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      animation: dotBlink 1s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Status messages ── */
    .status-box {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      animation: statusSlideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    @keyframes statusSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .status-box.visible { display: flex; }
    .status-box.success {
      background: var(--success-bg);
      color: #16a34a;
    }
    .status-box.error {
      background: var(--error-bg);
      color: #dc2626;
    }
    .status-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    /* Checkmark animation */
    .checkmark-circle {
      stroke: var(--success);
      stroke-dasharray: 64;
      stroke-dashoffset: 64;
      animation: checkCircle 0.4s ease-out 0.1s forwards;
    }
    .checkmark-path {
      stroke: var(--success);
      stroke-dasharray: 16;
      stroke-dashoffset: 16;
      animation: checkDraw 0.3s ease-out 0.4s forwards;
    }
    @keyframes checkCircle {
      to { stroke-dashoffset: 0; }
    }
    @keyframes checkDraw {
      to { stroke-dashoffset: 0; }
    }
    /* Error X animation */
    .error-x line {
      stroke: var(--error);
      stroke-dasharray: 12;
      stroke-dashoffset: 12;
      animation: xDraw 0.25s ease-out 0.15s forwards;
    }
    @keyframes xDraw {
      to { stroke-dashoffset: 0; }
    }

    /* ── Settings panel ── */
    .settings-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
      border-top: 1px solid var(--border);
    }
    .settings-toggle:hover .gear-icon {
      transform: rotate(45deg);
    }
    .gear-icon {
      width: 16px;
      height: 16px;
      color: var(--fg2);
      transition: transform 0.3s ease;
    }
    .settings-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg2);
      flex: 1;
    }
    .settings-chevron {
      width: 14px;
      height: 14px;
      color: var(--fg3);
      transition: transform 0.25s ease;
    }
    .settings-chevron.open {
      transform: rotate(180deg);
    }
    .settings-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .settings-body.open {
      max-height: 120px;
    }
    .settings-inner {
      padding: 0 0 12px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      background: var(--bg2);
      color: var(--fg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-glow);
    }
    .input-wrap input::placeholder {
      color: var(--fg3);
    }
    .input-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--fg3);
    }

    /* ── Footer ── */
    .footer {
      padding: 12px 20px 14px;
      text-align: center;
      font-size: 11px;
      color: var(--fg3);
      border-top: 1px solid var(--border);
    }
    .footer a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .footer a:hover {
      opacity: 0.8;
    }

    /* ── Spinner for button ── */
    .spinner-ring {
      width: 16px;
      height: 16px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>svg.new</h1>
        <p>AI-powered image to SVG</p>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Convert button -->
    <button class="btn-convert" id="vectorizeBtn" onclick="vectorizeSelection()">
      <span class="btn-inner">
        <svg class="icon-convert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
        </svg>
        Convert Selected Layer
      </span>
    </button>

    <!-- Progress indicator -->
    <div class="progress-container" id="progressContainer">
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-label">
        <span class="progress-dot"></span>
        <span id="progressText">Processing...</span>
      </div>
    </div>

    <!-- Status messages -->
    <div class="status-box" id="statusBox">
      <span class="status-icon" id="statusIcon"></span>
      <span id="statusText"></span>
    </div>

    <!-- Divider -->
    <div class="divider-row">
      <div class="divider-line"></div>
      <span class="divider-text">or upload</span>
      <div class="divider-line"></div>
    </div>

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-label">Drop an image here</div>
      <div class="drop-hint">or click to browse</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" />

    <!-- Settings (collapsible) -->
    <div class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
      <svg class="gear-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span class="settings-label">Settings</span>
      <svg class="settings-chevron" id="settingsChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

    <div class="settings-body" id="settingsBody">
      <div class="settings-inner">
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="apiKey" placeholder="Enter API key (svk_...)" autocomplete="off" spellcheck="false" />
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Get your API key at <a href="https://svg.new/account" target="_blank">svg.new/account</a>
  </div>

  <script>
    let processing = false;

    // ── Settings toggle ──
    function toggleSettings() {
      const body = document.getElementById('settingsBody');
      const chevron = document.getElementById('settingsChevron');
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    }

    // ── Status handling ──
    function showProgress(msg) {
      document.getElementById('progressContainer').classList.add('visible');
      document.getElementById('progressText').textContent = msg;
      hideStatus();
    }

    function hideProgress() {
      document.getElementById('progressContainer').classList.remove('visible');
    }

    function showStatus(msg, type) {
      hideProgress();
      const box = document.getElementById('statusBox');
      const icon = document.getElementById('statusIcon');
      const text = document.getElementById('statusText');

      box.className = 'status-box visible ' + type;
      text.textContent = msg;

      if (type === 'success') {
        icon.innerHTML = '<svg viewBox="0 0 22 22" fill="none" width="20" height="20"><circle class="checkmark-circle" cx="11" cy="11" r="10" stroke-width="2" fill="none"/><path class="checkmark-path" d="M6 11.5l3 3 7-7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      } else {
        icon.innerHTML = '<svg viewBox="0 0 22 22" fill="none" width="20" height="20"><circle cx="11" cy="11" r="10" stroke="' + getComputedStyle(document.documentElement).getPropertyValue('--error').trim() + '" stroke-width="2" fill="none"/><g class="error-x"><line x1="8" y1="8" x2="14" y2="14" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="8" x2="8" y2="14" stroke-width="2" stroke-linecap="round"/></g></svg>';
      }
    }

    function hideStatus() {
      document.getElementById('statusBox').className = 'status-box';
    }

    // ── Processing state ──
    function setProcessing(on) {
      processing = on;
      const btn = document.getElementById('vectorizeBtn');
      btn.disabled = on;
      if (on) {
        btn.innerHTML = '<span class="btn-inner"><svg class="spinner-ring" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/><path d="M22 12a10 10 0 0 0-10-10" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>Converting...</span>';
      } else {
        btn.innerHTML = '<span class="btn-inner"><svg class="icon-convert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>Convert Selected Layer</span>';
      }
    }

    // ── API key ──
    function getApiKey() {
      const key = document.getElementById('apiKey').value.trim();
      if (!key) {
        // Open settings if closed
        const body = document.getElementById('settingsBody');
        if (!body.classList.contains('open')) toggleSettings();
        showStatus('Enter your API key in Settings', 'error');
        document.getElementById('apiKey').focus();
        return null;
      }
      return key;
    }

    // ── Convert handler ──
    function vectorizeSelection() {
      if (processing) return;
      if (!getApiKey()) return;
      setProcessing(true);
      hideStatus();
      showProgress('Exporting layer...');
      parent.postMessage({ pluginMessage: { type: 'vectorize-selection' } }, '*');
    }

    // ── API call ──
    async function sendToApi(base64) {
      const apiKey = getApiKey();
      if (!apiKey) { setProcessing(false); return; }

      showProgress('Vectorizing with AI...');
      try {
        const res = await fetch('https://svg.new/api/agent/vectorize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + apiKey },
          body: JSON.stringify({ image: base64 }),
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'API error ' + res.status);
        }
        const data = await res.json();
        showProgress('Inserting SVG...');
        parent.postMessage({ pluginMessage: { type: 'insert-svg', svg: data.svg } }, '*');
      } catch (e) {
        showStatus(e.message, 'error');
        setProcessing(false);
      }
    }

    // ── Messages from plugin ──
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'image-data') {
        const bytes = new Uint8Array(msg.data);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
        const base64 = 'data:image/png;base64,' + btoa(binary);
        sendToApi(base64);
      }

      if (msg.type === 'done') {
        showStatus('SVG vector inserted!', 'success');
        setProcessing(false);
      }

      if (msg.type === 'error') {
        showStatus(msg.message, 'error');
        setProcessing(false);
      }

      if (msg.type === 'status') {
        showProgress(msg.message);
      }
    };

    // ── File upload handling ──
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) { showStatus('Not a valid image file', 'error'); return; }
      if (!getApiKey()) return;
      setProcessing(true);
      hideStatus();
      showProgress('Uploading image...');
      const reader = new FileReader();
      reader.onload = () => sendToApi(reader.result);
      reader.readAsDataURL(file);
    }

    // ── Persist API key ──
    const apiKeyInput = document.getElementById('apiKey');
    const savedKey = localStorage.getItem('svgnew_api_key');
    if (savedKey) apiKeyInput.value = savedKey;
    apiKeyInput.addEventListener('input', () => {
      localStorage.setItem('svgnew_api_key', apiKeyInput.value);
    });
  </script>
</body>
